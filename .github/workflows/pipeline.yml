name: Node CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]   # easy to add more versions later

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm           # enables npm cache based on lockfile [web:11][web:12][web:15]

      - name: Install dependencies
        run: npm ci            # faster & reproducible in CI [web:11][web:12]

      - name: Lint
        if: hashFiles('package.json') != ''
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script defined, skipping."
          fi

      - name: Test
        if: hashFiles('package.json') != ''
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "No test script defined, skipping."
          fi

      - name: Build
        if: hashFiles('package.json') != ''
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script defined, skipping."
          fi

