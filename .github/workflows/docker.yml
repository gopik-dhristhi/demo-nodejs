name: Release (Docker + npm)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - 'v*'   # trigger on version tags

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # ✅ Ensure tag commit is from main branch
    if: github.ref_type == 'tag'

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required to check branches

      - name: Check if tag is on main
        id: check_branch
        run: |
          git fetch origin main
          TAG_COMMIT=$(git rev-list -n 1 $GITHUB_REF)
          if git branch -r --contains $TAG_COMMIT | grep -q "origin/main"; then
            echo "on_main=true" >> $GITHUB_OUTPUT
          else
            echo "on_main=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if not from main
        if: steps.check_branch.outputs.on_main != 'true'
        run: |
          echo "Tag is not from main branch. Exiting."   
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

  release:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔹 Extract tag (v1.0.0 → 1.0.0)
      - name: Get version from tag
        id: tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # 🔹 Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/

      # 🔹 Publish to npm
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 🔹 Docker login
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔹 Build & push Docker
      - name: Build & Push Docker image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.tag.outputs.VERSION }}
          docker build -t $IMAGE .
          docker push $IMAGE