name: Node CI with Docker on Merge

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: read
  packages: write

on:
  pull_request:
    branches: [ "main" ]
    types: [closed]  # Trigger when PR is closed

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          IMAGE_TAG="main-latest"
          echo "Building image: ${{ secrets.DOCKER_USERNAME }}/my-app:$IMAGE_TAG"
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:$IMAGE_TAG .

      - name: Push Docker image
        run: |
          IMAGE_TAG="main-latest"
          echo "Pushing image: ${{ secrets.DOCKER_USERNAME }}/my-app:$IMAGE_TAG"
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:$IMAGE_TAG